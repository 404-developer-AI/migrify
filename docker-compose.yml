services:
  app:
    image: ghcr.io/404-developer-ai/migrify:latest
    build:
      context: ./src
      dockerfile: Migrify.Web/Dockerfile
    container_name: migrify-app
    restart: unless-stopped
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=migrify;Username=${POSTGRES_USER:-migrify_user};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - MIGRIFY_ENCRYPTION_KEY=${MIGRIFY_ENCRYPTION_KEY:?MIGRIFY_ENCRYPTION_KEY is required}
      - AdminUser__Email=${ADMIN_EMAIL:-admin@migrify.local}
      - AdminUser__Password=${ADMIN_PASSWORD:-Admin123!}
      - ReverseProxy__Enabled=true
    volumes:
      - app-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  db:
    image: postgres:17-alpine
    container_name: migrify-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=migrify
      - POSTGRES_USER=${POSTGRES_USER:-migrify_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migrify_user} -d migrify"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: migrify-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MIGRIFY_DOMAIN=${MIGRIFY_DOMAIN:?MIGRIFY_DOMAIN is required}
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    container_name: migrify-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Runs once then exits; renewal via deploy/scripts/renew-cert.sh
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

volumes:
  pgdata:
    name: migrify-pgdata
  app-logs:
    name: migrify-logs
  certbot-webroot:
    name: migrify-certbot-webroot
  certbot-certs:
    name: migrify-certbot-certs
